<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>OneCurve — Rep Console</title>
<!-- Same config as the storefront: paste your URLs here (or set on Netlify). -->
<meta name="sheet-csv" content="">
<meta name="orders-endpoint" content="">
<meta name="recaptcha-key" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-h:#E2B84B;--dark:#080808;--surface:#0F0F0F;--card:#181818;
  --border:rgba(255,255,255,.08);--text:#F0EEE8;--muted:rgba(240,238,232,.55);--orange:#FB8C00;--green:#0F9D58;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;line-height:1.6;padding:20px;max-width:560px;margin:0 auto}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.12em;text-align:center;margin:8px 0 2px}
.logo span{color:var(--gold)}
.tag{text-align:center;color:var(--muted);font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px}
label{display:block;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
input,select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:1rem;font-family:inherit;outline:none}
input:focus,select:focus{border-color:var(--gold)}
.row{display:flex;gap:12px}.row>div{flex:1}
.modes{display:flex;gap:8px;margin-top:6px}
.mode{flex:1;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 6px;cursor:pointer;font-size:.9rem;transition:all .15s}
.mode.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.btn{width:100%;background:var(--gold);color:#0a0a0a;font-weight:700;font-size:1rem;border:none;border-radius:10px;padding:15px;margin-top:24px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--gold-h)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stock-pill{font-size:.72rem;color:var(--orange);margin-top:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-top:16px}
.note{font-size:.78rem;color:var(--muted);margin-top:10px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:13px 22px;border-radius:10px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:10}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#C62828}
.recent{margin-top:8px}
.recent-item{display:flex;justify-content:space-between;font-size:.84rem;padding:9px 0;border-bottom:1px solid var(--border);color:var(--muted)}
.recent-item b{color:var(--text);font-weight:600}
.amt{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold);text-align:right;margin-top:4px}
.hide{display:none}
.gate-msg{font-size:.8rem;color:var(--muted);margin-top:8px}
</style>
<script src="scripts/sheet-sync.js"></script>
<script src="scripts/recaptcha.js"></script>
</head>
<body>
<div class="logo">ONE<span>CURVE</span></div>
<div class="tag">Sales Rep Console</div>

<!-- GATE: passcode -->
<div class="card" id="gate">
  <label>Rep Passcode</label>
  <input type="password" id="passcode" placeholder="Enter your passcode" autocomplete="off">
  <button class="btn" onclick="unlock()">Enter</button>
  <div class="gate-msg">Ask the owner for your passcode. It is checked on the server for every sale.</div>
</div>

<!-- SALE FORM -->
<div id="app" class="hide">
  <div class="card">
    <label>Product</label>
    <select id="prod" onchange="updAmt()"></select>
    <div class="stock-pill" id="stockPill"></div>

    <div class="row">
      <div>
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1" oninput="updAmt()">
      </div>
      <div>
        <label>Unit Price (Rs.)</label>
        <input type="number" id="price" oninput="updAmt()">
      </div>
    </div>

    <label>Payment Mode</label>
    <div class="modes" id="modes">
      <div class="mode on" data-m="Cash" onclick="selMode(this)">Cash</div>
      <div class="mode" data-m="UPI" onclick="selMode(this)">UPI</div>
      <div class="mode" data-m="Card" onclick="selMode(this)">Card</div>
    </div>

    <div class="row">
      <div><label>Customer Name</label><input type="text" id="cname" placeholder="Optional"></div>
      <div><label>Customer Phone</label><input type="text" id="cphone" placeholder="Optional"></div>
    </div>

    <div class="amt" id="amt">Rs.0</div>
    <button class="btn" id="submitBtn" onclick="submitSale()">Record Sale</button>
    <div class="note">This logs to the shared Google Sheet and reduces stock for this item. It is the same ledger the website uses.</div>
  </div>

  <div class="card recent">
    <label style="margin-top:0">Recorded this session</label>
    <div id="recent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let PRODS=[],mode='Cash',recent=[];
function endpoint(){const m=document.querySelector('meta[name="orders-endpoint"]');return m?m.content.trim():'';}
function fmt(n){return 'Rs.'+Number(n||0).toLocaleString('en-IN');}

async function unlock(){
  const pc=document.getElementById('passcode').value.trim();
  if(!pc){toast('Enter a passcode','err');return;}
  sessionStorage.setItem('oc-rep-pc',pc);
  document.getElementById('gate').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  await loadProducts();
}

async function loadProducts(){
  let all=[];
  try{const r=await fetch('data/products.json',{cache:'no-store'});if(r.ok){const d=await r.json();all=d.products||[];}}catch(e){}
  try{if(window.OneCurveStock){const live=await window.OneCurveStock.fetchStock();if(live)all.forEach(p=>{const e=live[p.id];if(e){if(e.stock!=null)p.stock=e.stock;if(e.price!=null)p.price=e.price;if(e.active!=null)p.active=e.active;}});}}catch(e){}
  PRODS=all.filter(p=>p.active!==false);
  const sel=document.getElementById('prod');
  sel.innerHTML=PRODS.map(p=>`<option value="${p.id}">${p.name} — ${fmt(p.price)}${p.stock!=null?' ('+p.stock+' in stock)':''}</option>`).join('');
  updAmt();
}

function selMode(el){document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));el.classList.add('on');mode=el.dataset.m;}

function curProd(){return PRODS.find(p=>p.id===parseInt(document.getElementById('prod').value));}
function updAmt(){
  const p=curProd();if(!p)return;
  document.getElementById('price').value=p.price;
  const qty=parseInt(document.getElementById('qty').value)||1;
  document.getElementById('amt').textContent=fmt((parseInt(document.getElementById('price').value)||0)*qty);
  const pill=document.getElementById('stockPill');
  if(p.stock!=null&&p.stock<=(p.lowStockThreshold!=null?p.lowStockThreshold:3)){pill.textContent=p.stock<=0?'Out of stock — recording as backorder':'Only '+p.stock+' left in stock';}
  else pill.textContent='';
}

async function submitSale(){
  const p=curProd();if(!p)return;
  const qty=parseInt(document.getElementById('qty').value)||1;
  const price=parseInt(document.getElementById('price').value)||p.price;
  const pc=sessionStorage.getItem('oc-rep-pc')||'';
  const url=endpoint();
  let rcToken='';
  try{if(window.OneCurveRecaptcha)rcToken=await window.OneCurveRecaptcha.getToken('rep_sale');}catch(e){}
  const payload={type:'sale',channel:'OFFLINE',passcode:pc,payment_mode:mode,recaptcha_token:rcToken,
    customer_name:document.getElementById('cname').value.trim(),
    customer_phone:document.getElementById('cphone').value.trim(),
    amount:price*qty,items:[{id:p.id,name:p.name,qty,price}]};
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Recording...';
  if(!url){
    // No backend configured (e.g. preview) — record locally so the UI is demoable.
    finishSale(p,qty,price,true,'(no endpoint — local only)');btn.disabled=false;btn.textContent='Record Sale';return;
  }
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    finishSale(p,qty,price,true,'');
  }catch(e){toast('Failed to record — check connection','err');}
  btn.disabled=false;btn.textContent='Record Sale';
}

function finishSale(p,qty,price,ok,extra){
  // optimistic local stock decrement so the list reflects reality immediately
  if(p.stock!=null)p.stock=p.stock-qty;
  recent.unshift({name:p.name,qty,amt:price*qty,mode});
  renderRecent();loadProductsRefreshOptions();
  document.getElementById('cname').value='';document.getElementById('cphone').value='';
  document.getElementById('qty').value=1;updAmt();
  toast('Sale recorded '+(extra||''));
}
function loadProductsRefreshOptions(){
  const sel=document.getElementById('prod'),cur=sel.value;
  sel.innerHTML=PRODS.map(p=>`<option value="${p.id}">${p.name} — ${fmt(p.price)}${p.stock!=null?' ('+p.stock+' in stock)':''}</option>`).join('');
  sel.value=cur;updAmt();
}
function renderRecent(){
  document.getElementById('recent').innerHTML=recent.map(r=>`<div class="recent-item"><span><b>${r.name}</b> ×${r.qty} · ${r.mode}</span><span>${fmt(r.amt)}</span></div>`).join('')||'<div class="note">No sales yet this session.</div>';
}
let toastT;
function toast(msg,cls){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(cls?' '+cls:'');clearTimeout(toastT);toastT=setTimeout(()=>el.className='toast',2600);}

// Auto-unlock if passcode already entered this session
if(sessionStorage.getItem('oc-rep-pc')){document.getElementById('gate').classList.add('hide');document.getElementById('app').classList.remove('hide');loadProducts();}
</script>
</body>
</html>
