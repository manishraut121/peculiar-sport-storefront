# Codespaces dev stack — no sudo/apt needed. Postgres + Redis run as their
# own containers; the app container holds the Node toolchain and runs both
# the Medusa backend (:9000) and the Next.js storefront (:8000).
services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    command: sleep infinity
    volumes:
      - ../..:/workspaces:cached
    environment:
      DATABASE_URL: postgres://medusa:medusa@db:5432/onecurve
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: onecurve
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d onecurve"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:
