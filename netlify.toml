# OneCurve Sports — Netlify configuration
# Vanilla HTML bridge (index.html) + optional Razorpay functions.
#
# CUTOVER: when the Medusa + Next shop is live on onecurve.in, enable the
# 301 block below (and remove/disable checkout functions) so there is only
# ONE cart/inventory. See CUTOVER.md.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Decap CMS admin (single page app under /admin)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# --- PROD CUTOVER (uncomment after platform DNS is live) ---
# [[redirects]]
#   from = "/*"
#   to = "https://onecurve.in/:splat"
#   status = 301
#   force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
