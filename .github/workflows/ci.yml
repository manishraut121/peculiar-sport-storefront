name: CI

# Builds both apps on every push/PR to the platform branches. This is exactly
# the strict `medusa build` that catches TypeScript errors before they reach
# Railway/Vercel (e.g. the ShippingProfile type error that failed a deploy).

on:
  push:
    branches: [main, platform-phase-1]
  pull_request:
    branches: [main, platform-phase-1]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate feature flags (prod safety invariants)
        run: ./scripts/validate-flags.sh

      - name: Build backend (strict — catches TS errors)
        working-directory: platform/apps/backend
        run: npx medusa build

      - name: Build storefront
        working-directory: platform/apps/storefront
        env:
          # Placeholder envs so the Next build runs in CI without a live
          # backend; data fetches fall back gracefully (generateStaticParams
          # is wrapped in try/catch).
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
          MEDUSA_BACKEND_URL: http://localhost:9000
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_placeholder
          NEXT_PUBLIC_BASE_URL: https://onecurve.in
          NEXT_PUBLIC_DEFAULT_REGION: in
          NEXT_PUBLIC_OC_ENV: dev
          NEXT_PUBLIC_OC_FEATURE_FLAGS: '{"payments":{"razorpay":false,"razorpay_live_keys":false,"manual_checkout":true,"cod":false},"commerce":{"free_shipping_threshold":2999,"shipping_flat_inr":199,"prices_tax_inclusive":true,"gst_line_item":false},"features":{"ai_assistant":true,"smart_search":true,"blog":true,"customer_accounts":true,"reviews":false,"wishlist":false,"pos":false,"bookkeeping":true,"maintenance_mode":false},"ops":{"seed_on_boot":true,"debug_logging":true,"e2e_hooks":true,"show_env_badge":true}}'
        run: npm run build
